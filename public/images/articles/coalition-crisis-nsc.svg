<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Parliament building icon -->
  <g transform="translate(400,180)" fill="none" stroke="#5c6bc0" stroke-width="3">
    <!-- Dome -->
    <path d="M-60,0 Q-60,-50 0,-60 Q60,-50 60,0" fill="#283593"/>
    <!-- Pillars -->
    <line x1="-50" y1="0" x2="-50" y2="60"/>
    <line x1="-25" y1="0" x2="-25" y2="60"/>
    <line x1="0" y1="0" x2="0" y2="60"/>
    <line x1="25" y1="0" x2="25" y2="60"/>
    <line x1="50" y1="0" x2="50" y2="60"/>
    <!-- Base -->
    <rect x="-65" y="60" width="130" height="10" fill="#283593" stroke="#5c6bc0"/>
    <!-- Top -->
    <rect x="-65" y="-5" width="130" height="8" fill="#283593" stroke="#5c6bc0"/>
    <!-- Flag on top -->
    <line x1="0" y1="-60" x2="0" y2="-85"/>
    <rect x="0" y="-85" width="20" height="12" fill="#e53935"/>
  </g>
  <!-- Warning symbol -->
  <g transform="translate(400,140)">
    <text text-anchor="middle" font-size="28" fill="#ef5350" font-family="Arial">&#x26A0;</text>
  </g>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#c5cae9">משבר קואליציוני</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7986cb">Coalition Crisis - NSC</text>
</svg>