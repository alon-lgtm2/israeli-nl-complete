<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f57f17"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Euro coin icon -->
  <g transform="translate(400,185)">
    <circle cx="0" cy="0" r="65" fill="#ffb300" stroke="#fff8e1" stroke-width="4"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#fff8e1" stroke-width="2"/>
    <text text-anchor="middle" dominant-baseline="central" font-size="60" fill="#e65100" font-family="Arial" font-weight="bold">&euro;</text>
  </g>
  <!-- Small percentage symbol -->
  <g transform="translate(460,140)">
    <text font-size="24" fill="#fff8e1" font-family="Arial" font-weight="bold">%</text>
  </g>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff8e1">רפורמת מס לאקספטים</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffe0b2">Dutch Tax Reform - Expats</text>
</svg>