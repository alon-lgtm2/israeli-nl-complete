<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1fa2"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Picture frame icon -->
  <g transform="translate(400,175)">
    <!-- Outer frame -->
    <rect x="-65" y="-55" width="130" height="100" rx="3" fill="none" stroke="#ce93d8" stroke-width="5"/>
    <!-- Inner frame -->
    <rect x="-55" y="-45" width="110" height="80" rx="2" fill="#9c27b0" stroke="#e1bee7" stroke-width="2"/>
    <!-- Abstract art inside -->
    <circle cx="-15" cy="-15" r="20" fill="#e040fb" opacity="0.6"/>
    <circle cx="20" cy="5" r="15" fill="#ea80fc" opacity="0.5"/>
    <polygon points="-30,25 0,-10 30,25" fill="#ab47bc" opacity="0.7"/>
    <!-- Palette icon small -->
    <g transform="translate(55,-45) scale(0.5)">
      <ellipse cx="0" cy="0" rx="25" ry="20" fill="#e1bee7"/>
      <circle cx="-10" cy="-5" r="4" fill="#f44336"/>
      <circle cx="5" cy="-8" r="4" fill="#2196f3"/>
      <circle cx="10" cy="5" r="4" fill="#ffeb3b"/>
    </g>
  </g>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e1bee7">אמנות ישראלית ברייקסמוזיאום</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ce93d8">Rijksmuseum Israeli Art</text>
</svg>