<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0"/>
      <stop offset="30%" style="stop-color:#e3f2fd"/>
      <stop offset="70%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Star of David -->
  <g transform="translate(400,180)" stroke="#1565c0" stroke-width="3" fill="none">
    <polygon points="0,-50 43.3,25 -43.3,25"/>
    <polygon points="0,50 43.3,-25 -43.3,-25"/>
  </g>
  <!-- Small flag pole -->
  <g transform="translate(320,120)">
    <line x1="0" y1="0" x2="0" y2="100" stroke="#1565c0" stroke-width="3"/>
    <rect x="2" y="5" width="35" height="22" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <line x1="2" y1="10" x2="37" y2="10" stroke="#1565c0" stroke-width="2"/>
    <line x1="2" y1="22" x2="37" y2="22" stroke="#1565c0" stroke-width="2"/>
  </g>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0d47a1">יום העצמאות בשגרירות</text>
  <text x="400" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1565c0">Yom Ha'atzmaut - Embassy</text>
</svg>