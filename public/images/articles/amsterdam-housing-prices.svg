<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100"/>
      <stop offset="100%" style="stop-color:#bf360c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- House icon -->
  <g transform="translate(400,180)">
    <!-- Roof -->
    <polygon points="0,-60 70,0 -70,0" fill="#ff8a65" stroke="#ffccbc" stroke-width="3"/>
    <!-- Body -->
    <rect x="-50" y="0" width="100" height="65" fill="#ff7043" stroke="#ffccbc" stroke-width="3"/>
    <!-- Door -->
    <rect x="-12" y="25" width="24" height="40" rx="3" fill="#bf360c" stroke="#ffccbc" stroke-width="2"/>
    <!-- Windows -->
    <rect x="-40" y="12" width="20" height="20" rx="2" fill="#ffccbc" opacity="0.8"/>
    <rect x="20" y="12" width="20" height="20" rx="2" fill="#ffccbc" opacity="0.8"/>
    <!-- Chimney -->
    <rect x="30" y="-45" width="15" height="25" fill="#ff7043" stroke="#ffccbc" stroke-width="2"/>
  </g>
  <!-- Price arrow going up -->
  <g transform="translate(500,140)">
    <line x1="0" y1="30" x2="25" y2="-10" stroke="#ffeb3b" stroke-width="3"/>
    <polygon points="25,-10 18,-2 28,2" fill="#ffeb3b"/>
    <text x="30" y="0" font-size="18" fill="#ffeb3b" font-family="Arial" font-weight="bold">&euro;</text>
  </g>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffccbc">מחירי דיור באמסטרדם</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ff8a65">Amsterdam Housing Prices</text>
</svg>