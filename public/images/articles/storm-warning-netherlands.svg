<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Storm cloud -->
  <g transform="translate(400,160)">
    <ellipse cx="0" cy="0" rx="70" ry="35" fill="#546e7a"/>
    <ellipse cx="-30" cy="-15" rx="40" ry="30" fill="#546e7a"/>
    <ellipse cx="25" cy="-20" rx="45" ry="28" fill="#546e7a"/>
    <ellipse cx="45" cy="0" rx="30" ry="20" fill="#546e7a"/>
    <!-- Lightning bolt -->
    <polygon points="5,15 -10,50 5,45 -5,80 20,40 5,45" fill="#ffeb3b"/>
    <!-- Second lightning -->
    <polygon points="-30,20 -40,45 -30,42 -37,65 -20,38 -30,42" fill="#fff176" opacity="0.7"/>
  </g>
  <!-- Rain drops -->
  <g fill="#90a4ae" opacity="0.5">
    <line x1="340" y1="210" x2="335" y2="230" stroke="#90a4ae" stroke-width="2"/>
    <line x1="370" y1="215" x2="365" y2="235" stroke="#90a4ae" stroke-width="2"/>
    <line x1="420" y1="210" x2="415" y2="230" stroke="#90a4ae" stroke-width="2"/>
    <line x1="450" y1="215" x2="445" y2="235" stroke="#90a4ae" stroke-width="2"/>
    <line x1="470" y1="208" x2="465" y2="228" stroke="#90a4ae" stroke-width="2"/>
  </g>
  <!-- Wind lines -->
  <g stroke="#78909c" stroke-width="2" opacity="0.4">
    <line x1="200" y1="145" x2="280" y2="145"/>
    <line x1="220" y1="160" x2="270" y2="160"/>
    <line x1="500" y1="150" x2="580" y2="150"/>
    <line x1="520" y1="165" x2="570" y2="165"/>
  </g>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#b0bec5">אזהרת סערה בהולנד</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#78909c">Storm Warning Netherlands</text>
</svg>