<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d32f2f"/>
      <stop offset="100%" style="stop-color:#e65100"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Train icon -->
  <g transform="translate(400,175)">
    <!-- Train body -->
    <rect x="-60" y="-35" width="120" height="60" rx="10" fill="#ef5350" stroke="#ffcdd2" stroke-width="3"/>
    <!-- Windows -->
    <rect x="-45" y="-25" width="25" height="20" rx="3" fill="#ffcdd2" opacity="0.8"/>
    <rect x="-12" y="-25" width="25" height="20" rx="3" fill="#ffcdd2" opacity="0.8"/>
    <rect x="22" y="-25" width="25" height="20" rx="3" fill="#ffcdd2" opacity="0.8"/>
    <!-- Front -->
    <rect x="55" y="-20" width="15" height="35" rx="5" fill="#c62828" stroke="#ffcdd2" stroke-width="2"/>
    <circle cx="62" cy="-8" r="5" fill="#ffeb3b"/>
    <!-- Wheels -->
    <circle cx="-35" cy="30" r="10" fill="#b71c1c" stroke="#ffcdd2" stroke-width="2"/>
    <circle cx="0" cy="30" r="10" fill="#b71c1c" stroke="#ffcdd2" stroke-width="2"/>
    <circle cx="35" cy="30" r="10" fill="#b71c1c" stroke="#ffcdd2" stroke-width="2"/>
    <!-- Track -->
    <line x1="-100" y1="42" x2="100" y2="42" stroke="#ffcdd2" stroke-width="3"/>
  </g>
  <!-- Warning X -->
  <g transform="translate(400,100)">
    <circle cx="0" cy="0" r="22" fill="#ffeb3b"/>
    <text text-anchor="middle" dominant-baseline="central" font-size="28" fill="#d32f2f" font-family="Arial" font-weight="bold">!</text>
  </g>
  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffcdd2">שיבושי רכבות NS</text>
  <text x="400" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ef9a9a">NS Train Disruptions</text>
</svg>