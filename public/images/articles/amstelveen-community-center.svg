<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00838f"/>
      <stop offset="100%" style="stop-color:#006064"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- People/community icon -->
  <g transform="translate(400,175)">
    <!-- Center person -->
    <circle cx="0" cy="-40" r="18" fill="#4dd0e1" stroke="#b2ebf2" stroke-width="2"/>
    <path d="M-25,-15 Q-25,-5 0,0 Q25,-5 25,-15" fill="none" stroke="#b2ebf2" stroke-width="2"/>
    <ellipse cx="0" cy="10" rx="28" ry="35" fill="#4dd0e1" stroke="#b2ebf2" stroke-width="2"/>
    <!-- Left person -->
    <circle cx="-55" cy="-25" r="15" fill="#26c6da" stroke="#b2ebf2" stroke-width="2"/>
    <ellipse cx="-55" cy="20" rx="22" ry="30" fill="#26c6da" stroke="#b2ebf2" stroke-width="2"/>
    <!-- Right person -->
    <circle cx="55" cy="-25" r="15" fill="#26c6da" stroke="#b2ebf2" stroke-width="2"/>
    <ellipse cx="55" cy="20" rx="22" ry="30" fill="#26c6da" stroke="#b2ebf2" stroke-width="2"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#80deea" stroke-width="1" opacity="0.4">
    <line x1="345" y1="175" x2="400" y2="175"/>
    <line x1="455" y1="175" x2="400" y2="175"/>
  </g>
  <text x="400" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#b2ebf2">מרכז קהילתי אמסטלפין</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#80deea">Amstelveen Community Center</text>
</svg>