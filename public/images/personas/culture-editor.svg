<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Purple background circle -->
  <circle cx="100" cy="100" r="100" fill="#7c3aed"/>
  <!-- Theater masks -->
  <!-- Happy mask -->
  <g transform="translate(60, 68) scale(0.9)">
    <!-- Mask shape -->
    <path d="M5 10 Q5 0 25 0 Q45 0 55 5 Q60 10 60 25 Q60 45 35 55 Q25 58 15 50 Q5 40 5 25 Z" fill="#ffffff"/>
    <!-- Eye holes -->
    <ellipse cx="20" cy="20" rx="6" ry="7" fill="#7c3aed"/>
    <ellipse cx="42" cy="18" rx="6" ry="7" fill="#7c3aed"/>
    <!-- Happy mouth -->
    <path d="M18 35 Q30 48 44 33" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Sad mask -->
  <g transform="translate(100, 82) scale(0.9)">
    <!-- Mask shape -->
    <path d="M5 5 Q10 0 30 0 Q50 0 55 10 Q58 20 55 35 Q50 50 35 55 Q20 55 10 45 Q2 35 2 20 Z" fill="#ffffff" opacity="0.85"/>
    <!-- Eye holes -->
    <ellipse cx="18" cy="18" rx="6" ry="7" fill="#7c3aed"/>
    <ellipse cx="40" cy="18" rx="6" ry="7" fill="#7c3aed"/>
    <!-- Sad mouth -->
    <path d="M18 40 Q28 30 42 40" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Paintbrush -->
  <g transform="translate(135, 55) rotate(35)">
    <!-- Handle -->
    <rect x="-3" y="0" width="6" height="40" rx="2" fill="#ffffff" opacity="0.7"/>
    <!-- Ferrule -->
    <rect x="-4" y="38" width="8" height="6" rx="1" fill="#ffffff" opacity="0.8"/>
    <!-- Bristles -->
    <path d="M-5 44 Q-6 55 -2 58 Q0 60 2 58 Q6 55 5 44 Z" fill="#ffffff"/>
  </g>
</svg>