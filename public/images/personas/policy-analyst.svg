<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Deep blue background circle -->
  <circle cx="100" cy="100" r="100" fill="#1a3a6c"/>
  <!-- Glasses -->
  <rect x="52" y="82" width="36" height="26" rx="5" fill="none" stroke="#ffffff" stroke-width="4"/>
  <rect x="112" y="82" width="36" height="26" rx="5" fill="none" stroke="#ffffff" stroke-width="4"/>
  <!-- Bridge -->
  <path d="M88 92 Q100 85 112 92" fill="none" stroke="#ffffff" stroke-width="4"/>
  <!-- Temple arms -->
  <line x1="52" y1="88" x2="40" y2="85" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="148" y1="88" x2="160" y2="85" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Lens shine -->
  <ellipse cx="64" cy="89" rx="5" ry="3" fill="#ffffff" opacity="0.25"/>
  <ellipse cx="124" cy="89" rx="5" ry="3" fill="#ffffff" opacity="0.25"/>
  <!-- Pen below glasses, angled -->
  <g transform="translate(100,130) rotate(-30)">
    <!-- Pen body -->
    <rect x="-4" y="-25" width="8" height="42" rx="2" fill="#ffffff"/>
    <!-- Pen tip -->
    <polygon points="-3,17 3,17 0,25" fill="#ffffff"/>
    <!-- Pen clip -->
    <rect x="4" y="-22" width="2.5" height="16" rx="1" fill="#ffffff" opacity="0.7"/>
    <!-- Pen cap band -->
    <rect x="-4" y="-10" width="8" height="3" rx="1" fill="#1a3a6c" opacity="0.3"/>
  </g>
</svg>