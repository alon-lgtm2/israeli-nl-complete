<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#E8EFF6"/>

  <!-- Neck -->
  <rect x="82" y="130" width="36" height="20" rx="4" fill="#D4A574"/>

  <!-- Shirt / Professional attire -->
  <path d="M50 195 Q50 155 72 148 L82 145 L100 155 L118 145 L128 148 Q150 155 150 195 Z" fill="#2C5F8A"/>
  <!-- Collar -->
  <path d="M82 145 L100 162 L118 145 L115 140 L100 152 L85 140 Z" fill="#FFFFFF"/>
  <!-- Tie -->
  <path d="M96 152 L100 162 L104 152 L102 185 L100 190 L98 185 Z" fill="#1A3A5C"/>

  <!-- Head -->
  <ellipse cx="100" cy="95" rx="42" ry="48" fill="#D4A574"/>

  <!-- Hair -->
  <path d="M58 85 Q58 48 100 45 Q142 48 142 85 Q142 70 130 62 Q115 52 100 52 Q85 52 70 62 Q58 70 58 85 Z" fill="#3D2B1F"/>
  <!-- Side hair -->
  <path d="M58 85 Q56 75 60 65 Q58 80 62 90 Z" fill="#3D2B1F"/>
  <path d="M142 85 Q144 75 140 65 Q142 80 138 90 Z" fill="#3D2B1F"/>

  <!-- Ears -->
  <ellipse cx="58" cy="98" rx="8" ry="12" fill="#C69A6B"/>
  <ellipse cx="142" cy="98" rx="8" ry="12" fill="#C69A6B"/>

  <!-- Glasses frames -->
  <rect x="68" y="85" width="26" height="20" rx="4" fill="none" stroke="#1A3A5C" stroke-width="2.5"/>
  <rect x="106" y="85" width="26" height="20" rx="4" fill="none" stroke="#1A3A5C" stroke-width="2.5"/>
  <!-- Glasses bridge -->
  <path d="M94 93 Q100 89 106 93" fill="none" stroke="#1A3A5C" stroke-width="2.5"/>
  <!-- Glasses arms -->
  <line x1="68" y1="91" x2="58" y2="89" stroke="#1A3A5C" stroke-width="2"/>
  <line x1="132" y1="91" x2="142" y2="89" stroke="#1A3A5C" stroke-width="2"/>
  <!-- Lens shine -->
  <ellipse cx="76" cy="91" rx="3" ry="2" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="114" cy="91" rx="3" ry="2" fill="#FFFFFF" opacity="0.3"/>

  <!-- Eyes behind glasses -->
  <ellipse cx="81" cy="95" rx="4" ry="4.5" fill="#FFFFFF"/>
  <ellipse cx="119" cy="95" rx="4" ry="4.5" fill="#FFFFFF"/>
  <circle cx="82" cy="95" r="2.5" fill="#2C4A6E"/>
  <circle cx="120" cy="95" r="2.5" fill="#2C4A6E"/>
  <circle cx="83" cy="94" r="1" fill="#FFFFFF"/>
  <circle cx="121" cy="94" r="1" fill="#FFFFFF"/>

  <!-- Eyebrows - slightly furrowed for analytical look -->
  <path d="M70 82 Q76 78 92 81" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M108 81 Q124 78 130 82" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M100 98 Q96 110 93 112 Q97 114 100 114 Q103 114 107 112 Q104 110 100 98" fill="#C69A6B"/>

  <!-- Mouth - slight confident smile -->
  <path d="M88 122 Q94 128 100 128 Q106 128 112 122" fill="none" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtle jawline definition -->
  <path d="M62 110 Q65 135 100 142 Q135 135 138 110" fill="none" stroke="#C69A6B" stroke-width="1" opacity="0.4"/>
</svg>