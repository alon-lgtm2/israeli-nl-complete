<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark blue to gold gradient background circle -->
  <defs>
    <linearGradient id="econGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a6c"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#econGrad)"/>
  <!-- Chart axes -->
  <line x1="45" y1="50" x2="45" y2="145" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="45" y1="145" x2="160" y2="145" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Grid lines (subtle) -->
  <line x1="45" y1="115" x2="155" y2="115" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <line x1="45" y1="85" x2="155" y2="85" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  <!-- Bar chart bars -->
  <rect x="58" y="110" width="14" height="35" rx="2" fill="#ffffff" opacity="0.6"/>
  <rect x="80" y="90" width="14" height="55" rx="2" fill="#ffffff" opacity="0.75"/>
  <rect x="102" y="75" width="14" height="70" rx="2" fill="#ffffff" opacity="0.85"/>
  <rect x="124" y="60" width="14" height="85" rx="2" fill="#ffffff"/>
  <!-- Trend line going up -->
  <polyline points="65,105 87,85 109,70 131,55" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow at end of trend line -->
  <polygon points="131,55 126,62 134,62" fill="#ffffff"/>
  <!-- Small dots on trend line -->
  <circle cx="65" cy="105" r="3" fill="#ffffff"/>
  <circle cx="87" cy="85" r="3" fill="#ffffff"/>
  <circle cx="109" cy="70" r="3" fill="#ffffff"/>
  <circle cx="131" cy="55" r="3.5" fill="#ffffff"/>
</svg>