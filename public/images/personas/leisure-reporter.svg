<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Yellow to sky blue gradient background circle -->
  <defs>
    <linearGradient id="leisureGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#leisureGrad)"/>
  <!-- Bicycle -->
  <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rear wheel -->
    <circle cx="65" cy="115" r="24" stroke-width="3"/>
    <!-- Front wheel -->
    <circle cx="140" cy="115" r="24" stroke-width="3"/>
    <!-- Rear wheel hub -->
    <circle cx="65" cy="115" r="3" fill="#ffffff"/>
    <!-- Front wheel hub -->
    <circle cx="140" cy="115" r="3" fill="#ffffff"/>
    <!-- Frame - seat tube -->
    <line x1="85" y1="80" x2="65" y2="115"/>
    <!-- Frame - top tube -->
    <line x1="85" y1="80" x2="115" y2="78"/>
    <!-- Frame - down tube -->
    <line x1="65" y1="115" x2="115" y2="78"/>
    <!-- Frame - chain stay -->
    <line x1="65" y1="115" x2="105" y2="105"/>
    <!-- Frame - seat stay -->
    <line x1="85" y1="80" x2="105" y2="105"/>
    <!-- Fork -->
    <line x1="115" y1="78" x2="140" y2="115"/>
    <!-- Front fork lower -->
    <line x1="105" y1="105" x2="140" y2="115"/>
    <!-- Handlebars -->
    <path d="M110 72 Q115 68 122 70" stroke-width="3"/>
    <!-- Seat -->
    <line x1="80" y1="78" x2="92" y2="76" stroke-width="4"/>
    <!-- Pedal area -->
    <circle cx="105" cy="105" r="4" fill="#ffffff" stroke="none"/>
    <!-- Spokes hint - rear -->
    <line x1="65" y1="115" x2="52" y2="100" stroke-width="1.5" opacity="0.4"/>
    <line x1="65" y1="115" x2="78" y2="100" stroke-width="1.5" opacity="0.4"/>
    <line x1="65" y1="115" x2="50" y2="120" stroke-width="1.5" opacity="0.4"/>
    <line x1="65" y1="115" x2="80" y2="125" stroke-width="1.5" opacity="0.4"/>
    <!-- Spokes hint - front -->
    <line x1="140" y1="115" x2="127" y2="100" stroke-width="1.5" opacity="0.4"/>
    <line x1="140" y1="115" x2="153" y2="100" stroke-width="1.5" opacity="0.4"/>
    <line x1="140" y1="115" x2="125" y2="120" stroke-width="1.5" opacity="0.4"/>
    <line x1="140" y1="115" x2="155" y2="125" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>