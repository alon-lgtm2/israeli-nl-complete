  <!-- Ears (partially hidden by hair) -->
  <ellipse cx="61" cy="95" rx="6" ry="10" fill="#C69A6B"/>
  <ellipse cx="139" cy="95" rx="6" ry="10" fill="#C69A6B"/>

  <!-- Small earrings -->
  <circle cx="61" cy="107" r="3" fill="#F5A623"/>
  <circle cx="139" cy="107" r="3" fill="#F5A623"/>

  <!-- Eyes - warm and friendly -->
  <ellipse cx="82" cy="90" rx="6" ry="6.5" fill="#FFFFFF"/>
  <ellipse cx="118" cy="90" rx="6" ry="6.5" fill="#FFFFFF"/>
  <circle cx="83" cy="90" r="3.5" fill="#5C3317"/>
  <circle cx="119" cy="90" r="3.5" fill="#5C3317"/>
  <circle cx="84" cy="89" r="1.2" fill="#FFFFFF"/>
  <circle cx="120" cy="89" r="1.2" fill="#FFFFFF"/>

  <!-- Eyelashes -->
  <path d="M75 86 Q78 83 82 84" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M89 84 Q92 83 94 86" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M106 86 Q108 83 112 84" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M124 84 Q126 83 128 86" fill="none" stroke="#3D2B1F" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Eyebrows - friendly arched -->
  <path d="M72 80 Q78 75 90 78" fill="none" stroke="#4A2810" stroke-width="2" stroke-linecap="round"/>
  <path d="M110 78 Q122 75 128 80" fill="none" stroke="#4A2810" stroke-width="2" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M100 94 Q97 105 95 107 Q98 109 100 109 Q102 109 105 107 Q103 105 100 94" fill="#C69A6B"/>

  <!-- Warm smile -->
  <path d="M85 118 Q92 126 100 127 Q108 126 115 118" fill="#FFFFFF" stroke="#8B5E3C" stroke-width="2" stroke-linecap="round"/>
  <!-- Upper lip line -->
  <path d="M85 118 Q92 116 100 118 Q108 116 115 118" fill="none" stroke="#8B5E3C" stroke-width="1"/>

  <!-- Blush / rosy cheeks -->
  <ellipse cx="72" cy="108" rx="8" ry="5" fill="#E8967A" opacity="0.35"/>
  <ellipse cx="128" cy="108" rx="8" ry="5" fill="#E8967A" opacity="0.35"/>
