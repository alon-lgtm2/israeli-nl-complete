<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#FFF3E6"/>

  <!-- Neck -->
  <rect x="84" y="130" width="32" height="18" rx="4" fill="#D4A574"/>

  <!-- Top / Blouse -->
