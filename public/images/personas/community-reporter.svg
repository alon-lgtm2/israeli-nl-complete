  <!-- Blouse detail -->
  <path d="M88 155 Q94 162 100 163 Q106 162 112 155" fill="none" stroke="#D06A20" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="100" cy="92" rx="40" ry="46" fill="#D4A574"/>

  <!-- Hair - flowing, warm brown -->
