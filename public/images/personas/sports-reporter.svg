<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Bright orange background circle -->
  <circle cx="100" cy="100" r="100" fill="#FF6B35"/>
  <!-- Football / Soccer ball -->
  <circle cx="95" cy="95" r="35" fill="none" stroke="#ffffff" stroke-width="3.5"/>
  <!-- Pentagon pattern on ball -->
  <polygon points="95,68 108,76 104,91 86,91 82,76" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Connecting lines from pentagon to edge -->
  <line x1="95" y1="68" x2="95" y2="60" stroke="#ffffff" stroke-width="2"/>
  <line x1="108" y1="76" x2="118" y2="66" stroke="#ffffff" stroke-width="2"/>
  <line x1="104" y1="91" x2="120" y2="96" stroke="#ffffff" stroke-width="2"/>
  <line x1="86" y1="91" x2="70" y2="96" stroke="#ffffff" stroke-width="2"/>
  <line x1="82" y1="76" x2="72" y2="66" stroke="#ffffff" stroke-width="2"/>
  <!-- Lower pentagon hint -->
  <path d="M86 91 L82 105 Q88 112 95 114" fill="none" stroke="#ffffff" stroke-width="2"/>
  <path d="M104 91 L108 105 Q102 112 95 114" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Motion lines -->
  <line x1="140" y1="78" x2="158" y2="68" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="138" y1="92" x2="160" y2="88" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="136" y1="106" x2="155" y2="108" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Speed swoosh -->
  <path d="M140 125 Q150 120 160 122" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
</svg>