<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-dutch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Blue gradient background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-dutch)"/>
  <!-- Head -->
  <circle cx="100" cy="62" r="24" fill="#ffffff"/>
  <!-- Hair - receding, older style -->
  <path d="M76 55 Q78 38 100 36 Q122 38 124 55" fill="#2563eb" opacity="0.3"/>
  <!-- Body - wool sweater -->
  <path d="M55 140 Q55 105 72 95 Q85 88 100 88 Q115 88 128 95 Q145 105 145 140 Q145 165 100 165 Q55 165 55 140 Z" fill="#ffffff"/>
  <!-- Sweater V-neck -->
  <path d="M90 88 L100 108 L110 88" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.3"/>
  <!-- Sweater texture - horizontal lines -->
  <line x1="62" y1="110" x2="138" y2="110" stroke="#2563eb" stroke-width="1" opacity="0.15"/>
  <line x1="58" y1="120" x2="142" y2="120" stroke="#2563eb" stroke-width="1" opacity="0.15"/>
  <line x1="56" y1="130" x2="144" y2="130" stroke="#2563eb" stroke-width="1" opacity="0.15"/>
  <line x1="57" y1="140" x2="143" y2="140" stroke="#2563eb" stroke-width="1" opacity="0.15"/>
  <!-- Reading glasses hanging from neck -->
  <path d="M88 92 L82 115" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <path d="M112 92 L118 115" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <!-- Hanging glasses frames -->
  <rect x="70" y="115" width="16" height="11" rx="3" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <rect x="114" y="115" width="16" height="11" rx="3" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <path d="M86 119 Q100 113 114 119" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Eyes -->
  <circle cx="90" cy="62" r="2.5" fill="#2563eb"/>
  <circle cx="110" cy="62" r="2.5" fill="#2563eb"/>
  <!-- Subtle smile -->
  <path d="M92 72 Q100 78 108 72" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <!-- Subtle windmill element bottom right -->
  <g transform="translate(160, 160) scale(0.6)" opacity="0.35">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#ffffff" stroke-width="3"/>
    <polygon points="0,0 -14,-8 -4,-2" fill="#ffffff"/>
    <polygon points="0,0 14,-8 4,-2" fill="#ffffff"/>
    <polygon points="0,0 -10,12 -2,4" fill="#ffffff"/>
    <polygon points="0,0 10,12 2,4" fill="#ffffff"/>
  </g>
</svg>